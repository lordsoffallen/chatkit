name: Publish CLI

on:
  workflow_dispatch:
  push:
    tags:
      - "*"

permissions:
  id-token: write
  contents: read

concurrency:
  group: publish-cli
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Sync CLI version from tag
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TAG_NAME: ${{ github.ref_name }}
          NPM_CONFIG_WORKSPACES: "false"
        working-directory: packages/cli
        run: |
          PACKAGE_VERSION="${TAG_NAME#v}"
          case "$PACKAGE_VERSION" in
            ''|*[!0-9A-Za-z.+-]*)
              echo "Unsupported tag format: $TAG_NAME"
              exit 1
              ;;
          esac
          if ! printf '%s' "$PACKAGE_VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'; then
            echo "Tag must resolve to a semver version, got: $TAG_NAME"
            exit 1
          fi
          npm version "$PACKAGE_VERSION" --no-git-tag-version

      - name: Pack CLI
        env:
          NPM_CONFIG_WORKSPACES: "false"
        working-directory: packages/cli
        run: npm pack

      - name: Publish CLI
        env:
          NPM_CONFIG_WORKSPACES: "false"
        working-directory: packages/cli
        run: npm publish --access public
